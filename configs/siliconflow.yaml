# 硅基流动 API 共用配置
# 密钥 SILICONFLOW_API_KEY 必须放在 .env，不在此文件
# 此处仅配置 base_url、timeout、各服务默认 model

base_url: "https://api.siliconflow.cn/v1"
timeout_s: 120

# 各服务默认模型（可被 .env 覆盖）
llm:
  model: "deepseek-ai/DeepSeek-V3.2"

tts:
  model: "FunAudioLLM/CosyVoice2-0.5B"
  voice_narrator: "FunAudioLLM/CosyVoice2-0.5B:claire"
  voice_male: "FunAudioLLM/CosyVoice2-0.5B:benjamin"
  voice_female: "FunAudioLLM/CosyVoice2-0.5B:anna"
  sample_rate: 24000
  response_format: "wav"

image:
  model_t2i: "Qwen/Qwen-Image"
  model_edit: "Qwen/Qwen-Image-Edit"
  image_size: "1664x928"
  steps: 50
  cfg: 4.0

# VLM 评审（Strict Image QA）
# Qwen3-VL-Thinking 可能触发 "151652 is not in list"，改用 Qwen2.5-VL
vlm:
  model: "Qwen/Qwen3-VL-235B-A22B-Instruct"
  detail: "low"
